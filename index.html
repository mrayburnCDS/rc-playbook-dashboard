ve Escalation`,`Customer Notification`],[`Low`,`None or non-sensitive`,`No impact on operations`,`CIO only`,`None`],[`Medium`,`Some sensitive data`,`Partial service disruption`,`CIO + General Counsel`,`If required by regulation`],[`High`,`Significant customer/employee data`,`Major service disruption`,`CEO + Board + General Counsel`,`Yes, within 48 hours`],[`Critical`,`Massive data exfiltration (customer PII, financial data)`,`System down. Revenue impact`,`Immediate board notification. Public disclosure likely`,`Immediate. Regulatory notification required`]]},{type:`heading`,level:3,text:`Communication Protocol During Incident`},{type:`list`,ordered:!1,items:[`Internal cascade:CEO notified immediately. Board notified within 1 hour (if High/Critical). All-hands communication if customer impact likely.`,`Regulatory notification:Consult general counsel. Determine if notification required under CCPA, GDPR, state laws. File required notices within timeframe (usually 30-60 days).`,`Customer notification:Transparent communication. Explain what happened (in non-technical terms), what data was affected, what we're doing, how customers can protect themselves.`,`Media response:Assign one spokesperson (CEO or PR lead). Consistent message. Don't speculate. Facts only.`]}]},{id:`section-140`,title:`Data Privacy Compliance: CCPA, State Laws, GDPR`,order:140,content:[{type:`paragraph`,text:`Data privacy regulations are expanding. CCPA (California), GDPR (EU), and state privacy laws require companies to disclose what data they collect, give consumers rights to access/delete data, and report breaches within timeframes.`},{type:`heading`,level:3,text:`CCPA & State Privacy Laws (US)`},{type:`list`,ordered:!1,items:[`CCPA (California):Applies to companies collecting CA residents' data. Consumers have rights: know what data is collected, delete data, opt-out of sale, non-discrimination. Companies must disclose in privacy policy.`,`State laws spreading:Colorado (CPA), Virginia (VCDPA), Connecticut (CTDPA), Utah (UCPA), Montana (MPA) all have similar privacy laws effective 2024-2025. If you have customers in these states, you're subject to their laws.`,`Baseline requirements:(1) Privacy policy that explains data collection, use, consumer rights. (2) Process to respond to data access/deletion requests within 45 days. (3) Breach notification within 30 days. (4) Opt-out mechanism for data sale.`]},{type:`heading`,level:3,text:`GDPR (EU)`},{type:`list`,ordered:!1,items:[`If you have EU customers or employees:GDPR applies. Much more stringent than CCPA. Personal data requires legal basis for processing (consent, contract, legitimate interest, etc.). Consumers have strong rights: access, deletion ("right to be forgotten"), data portability.`,`Key requirements:Data Protection Impact Assessment (DPIA) for high-risk processing. Data Processing Agreements (DPA) with all vendors. Breach notification within 72 hours. Appoint Data Protection Officer (DPO) if you process a lot of personal data.`,`Penalties:Up to 4% of global revenue (not just EU revenue). This is serious.`]},{type:`heading`,level:3,text:`Practical Implementation: Data Inventory & Privacy Impact Assessment`},{type:`list`,ordered:!1,items:[`Data inventory:Document all personal data you collect. Customer names, emails, phone numbers, addresses, transaction history, IP addresses. Who collects it? How is it stored? How long is it retained? Why do we need it?`,`Data retention policy:Define how long you keep each type of data. Delete customer data after account closure + retention period. Don't keep data "just in case."`,`Privacy impact assessment (PIA):For each high-risk processing activity (sharing data with vendors, automated decision-making, cross-border transfers), assess privacy risks and mitigations.`,`Vendor data processing agreements (DPA):Any vendor that processes personal data must sign a DPA. DPA specifies: vendor can only process data as instructed, vendor implements appropriate security, vendor notifies you of breaches, vendor deletes data on request.`]}]},{id:`section-141`,title:`Employee Security Training & Phishing Simulation`,order:141,content:[{type:`paragraph`,text:`Humans are the weakest link in security. 80%+ of breaches involve human error (clicking phishing link, weak password, sharing credentials). Training and awareness reduce this risk by 40-50%.`},{type:`heading`,level:3,text:`Annual Training Schedule`},{type:`list`,ordered:!1,items:[`Security awareness (quarterly, 30 min):General security topics. Password best practices, phishing identification, reporting suspected incidents, acceptable use policy.`,`Role-specific training:Finance team (data handling, vendor assessment). Sales team (customer data, pricing confidentiality). HR team (employee privacy). Admin team (access controls, vendor management).`,`Phishing simulation (monthly):Send realistic phishing emails to employees. Track who clicks/reports. Provide immediate feedback (education, not punishment). Trend should be: click rate declining, report rate increasing.`]},{type:`heading`,level:3,text:`Phishing Simulation Program Metrics`},{type:`table`,caption:null,headers:[`Metric`,`Target`,`Red Flag`],rows:[[`Metric`,`Target`,`Red Flag`],[`User click rate`,`<10%`,`>20% indicates poor awareness`],[`User report rate`,`>40%`,`<20% indicates employees don't know how to report`],[`Training completion`,`100%`,`<80% indicates enforcement issue`],[`Phishing attempts reported by users`,`>50% of all phishing`,`Employees not catching attacks`]]},{type:`heading`,level:3,text:`Creating a Security Culture`},{type:`list`,ordered:!1,items:[`Blameless incident reporting:Encourage employees to report suspected incidents without fear of punishment. "Better to over-report than under-report."`,`Leadership messaging:CEO and leadership team regularly communicate security importance. Lead by example: CEO enables MFA, uses strong passwords, reports suspicious activity.`,`Incident learnings:After any security incident, share a brief, non-technical summary with all employees. What happened? What should we learn? This reinforces security as everyone's responsibility.`]}]},{id:`section-142`,title:`Vendor Security Assessment & Third-Party Risk Management`,order:142,content:[{type:`paragraph`,text:`Most breaches don't happen at your organization; they happen at a vendor, and the attacker uses the vendor access to breach you. Assess and monitor third-party risk aggressively.`},{type:`heading`,level:3,text:`Vendor Classification: Risk-Based Assessment`},{type:`list`,ordered:!1,items:[`Critical vendors (Tier 1):Handle customer data or have access to financial systems. Require: SOC 2 Type II attestation, annual security assessment, incident notification SLA, cyber insurance $5M+.`,`Important vendors (Tier 2):Handle non-sensitive data or have limited system access. Require: security questionnaire, basic training for their staff handling your data, incident notification.`,`Standard vendors (Tier 3):Minimal data access, low impact if compromised. Standard contract with security clauses.`]},{type:`heading`,level:3,text:`Vendor Due Diligence Process`},{type:`list`,ordered:!1,items:[`Pre-engagement:Request SOC 2 report (for Tier 1) or security questionnaire (for Tier 2). Verify insurance (cyber, E&O). Check financial stability. Review incident history if known.`,`Contract terms:Include security requirements in contract. Vendor must implement reasonable security. Vendor must notify you of breaches within 24 hours. You have audit/assessment rights. Vendor maintains cyber insurance.`,`Ongoing monitoring:Annual security assessment for Tier 1. Track any public incidents involving vendor. Quarterly vendor risk review (steering committee). Remove vendor if security posture declines.`]}]},{id:`section-143`,title:`Enterprise Risk Framework: Systematic Risk Management`,order:143,content:[{type:`paragraph`,text:`Conduct a quarterly risk assessment with your leadership team. Use this framework to ensure no major risks are missed.`},{type:`heading`,level:3,text:`Risk Categories`},{type:`list`,ordered:!1,items:[`Strategic Risk:Market shifts, competitive threats, customer concentration, pricing power erosion. Example: Major customer announces vertical integration (will build their own instead of buying from us).`,`Operational Risk:Process failures, quality issues, supply chain disruption, talent loss. Example: Key field team member leaves; service quality suffers.`,`Financial Risk:Margin erosion, bad debt, cash flow problems, working capital strain. Example: Fuel prices spike; margins compress.`,`Compliance Risk:Regulatory changes, legal violations, licensing issues, environmental/labor law. Example: New staffing regulations increase labor costs; margins compress.`,`Reputational Risk:Customer incidents, media coverage, social media backlash, leadership scandal. Example: Serious safety incident makes headline; customer confidence drops.`]},{type:`heading`,level:3,text:`Risk Register Template`},{type:`table`,caption:null,headers:[`Risk`,`Likelihood (1-5)`,`Impact (1-5)`,`Risk Score`,`Owner`,`Mitigation`,`Status`],rows:[[`Risk`,`Likelihood (1-5)`,`Impact (1-5)`,`Risk Score`,`Owner`,`Mitigation`,`Status`],[`Customer A (20% of revenue) goes bankrupt`,`2`,`5`,`10`,`VP Sales`,`Reduce concentration <15%. Diversify sales.`,`In Progress`],[`Staffing shortage limits capacity growth`,`3`,`4`,`12`,`VP Ops`,`Improve pay/benefits. Contractor partnerships. Automation roadmap.`,`In Progress`],[`Cyber breach exposes customer data`,`2`,`5`,`10`,`CIO`,`EDR implementation. Penetration testing. DLP policies.`,`In Progress`],[`Equipment failure (major asset breakdown)`,`3`,`3`,`9`,`VP Ops`,`Preventive maintenance. Spare equipment. Contractor backup.`,`Monitored`]]},{type:`heading`,level:3,text:`Risk Assessment Cadence`},{type:`list`,ordered:!1,items:[`Quarterly:Leadership team (CEO, CFO, COO, functional leaders) meets to review risk register. Identify new risks. Assess changes in likelihood/impact of existing risks. Update mitigation status. Flag any risks approaching critical threshold (score >20).`,`Monthly:CEO briefly reviews high-risk items with relevant owner. Any new developments? Any progress on mitigation?`,`Annual:Board of directors reviews full risk register at Q4 board meeting. Discuss enterprise-level risks and risk appetite. Approve risk budget (insurance, mitigation investments).`]}]},{id:`section-144`,title:`Risk Heat Map: Likelihood vs. Impact Matrix`,order:144,content:[{type:`paragraph`,text:`Use a 5x5 matrix to visualize risk. Plot each risk by likelihood (x-axis) and impact (y-axis). Zones guide action:`},{type:`heading`,level:3,text:`The Risk Heat Map`},{type:`table`,caption:null,headers:[`Impact / Likelihood`,`Very Unlikely (1)`,`Unlikely (2)`,`Possible (3)`,`Likely (4)`,`Very Likely (5)`],rows:[[`Impact / Likelihood`,`Very Unlikely (1)`,`Unlikely (2)`,`Possible (3)`,`Likely (4)`,`Very Likely (5)`],[`Catastrophic (5)`,`5`,`10`,`15`,`20`,`25`],[`Major (4)`,`4`,`8`,`12`,`16`,`20`],[`Moderate (3)`,`3`,`6`,`9`,`12`,`15`],[`Minor (2)`,`2`,`4`,`6`,`8`,`10`],[`Negligible (1)`,`1`,`2`,`3`,`4`,`5`]]},{type:`heading`,level:3,text:`Action Zones`},{type:`list`,ordered:!1,items:[`Red Zone (Score 15-25): Immediate Action Required.These risks demand urgent attention. Active mitigation plan with assigned owner and timeline. CEO + board monitoring. Consider transferring risk via insurance.`,`Yellow Zone (Score 8-14): Monitor & Mitigate.These are material risks. Functional leader owns mitigation. Quarterly review. Insurance where appropriate.`,`Green Zone (Score 1-7): Accept & Monitor.Low-risk items. Accept the risk. Monitor for changes in likelihood/impact. No urgent action needed.`]}]},{id:`section-145`,title:`Insurance Coverage: The Risk Transfer Strategy`,order:145,content:[{type:`paragraph`,text:`Insurance is how you transfer certain risks to an insurance company. We won't hedge every risk, but we hedge the catastrophic ones. Insurance is cheap risk management compared to disaster.`},{type:`heading`,level:3,text:`Core Insurance Policies (By Function)`},{type:`table`,caption:null,headers:[`Coverage Type`,`Purpose`,`Minimum Coverage`,`Notes`],rows:[[`Coverage Type`,`Purpose`,`Minimum Coverage`,`Notes`],[`General Liability`,`Coverage for bodily injury, property damage claims from customers/public`,`$1M per occurrence / $2M aggregate (adjust for revenue)`,`Essential. Most insurance. Non-negotiable.`],[`Auto Liability`,`Coverage for vehicle accidents, bodily injury, property damage`,`$1M per accident (for fleet companies, much higher)`,`Legally required. Coverage tied to vehicle usage and industry.`],[`Workers' Compensation`,`Coverage for employee injuries, medical treatment, lost wages`,`State-mandated limits (varies by state)`,`Legally required. Covers employee injuries; caps exposure.`],[`Umbrella / Excess Liability`,`Additional coverage above GL and auto policies`,`$5M umbrella policy (for small-mid cap companies)`,`Cheap (relatively) relative to high coverage limits. Protects assets.`],[`Property Insurance`,`Coverage for buildings, equipment, inventory loss (fire, theft, natural disaster)`,`Replacement cost of all owned assets`,`Required if assets are financed (lenders require it).`],[`Cyber Liability`,`Coverage for data breach costs: incident response, notification, credit monitoring, legal`,`$5M (adjust for data volume and customers)`,`New but critical. Claims increasing. Get SOC 2 discount for good security.`],[`Directors & Officers (D&O)`,`Coverage for liability of directors and officers (shareholder lawsuits, employment claims)`,`$5M (adjust for company size and exposure)`,`Required by lenders. Protects management team from personal liability.`],[`Errors & Omissions (E&O)`,`Coverage for professional liability (e.g., if you give bad advice or miss a deadline that costs customer)`,`$1-5M (depends on profession)`,`Essential for service businesses. Covers professional negligence.`]]},{type:`heading`,level:3,text:`Insurance Budget by Company Size`},{type:`table`,caption:null,headers:[`Revenue`,`Annual Insurance Budget`,`% of Revenue`],rows:[[`Revenue`,`Annual Insurance Budget`,`% of Revenue`],[`$25M`,`$150K - $250K`,`0.6% - 1.0%`],[`$50M`,`$300K - $500K`,`0.6% - 1.0%`],[`$100M`,`$600K - $1M`,`0.6% - 1.0%`],[`$250M+`,`$1.5M - $2.5M`,`0.6% - 1.0%`]]},{type:`heading`,level:3,text:`Insurance Procurement Process`},{type:`list`,ordered:!1,items:[`Annual renewal (3 months before expiration):Engage insurance broker. Provide loss history, updated financials, operational changes. Broker obtains quotes from 3-5 carriers. Compare coverage, limits, deductibles, pricing.`,`Coverage review:Verify coverage limits are adequate for current business (revenue growth, new markets, new risks). Adjust if needed.`,`Risk management discount:Most carriers offer 10-20% discount for good safety record, security controls, claims management. Negotiate these discounts.`,`Claims process:Designate one person (CFO or Risk Manager) to manage claims. Report claim to insurer within timeframe (usually 30 days). Document loss. Cooperate with insurer investigation. Track claim status to resolution.`]}]},{id:`section-146`,title:`Business Continuity Planning: Preparing for Disruption`,order:146,content:[{type:`paragraph`,text:`Business continuity planning (BCP) prepares your organization for major disruptions (natural disaster, cyber attack, key person loss, supply chain failure). A good BCP minimizes business interruption and speeds recovery.`},{type:`heading`,level:3,text:`BCP Framework: Four Elements`},{type:`list`,ordered:!1,items:[`1. Identify Critical Processes:What are the mission-critical processes? Examples: order processing, work scheduling, service delivery, invoicing. For any company: customer support, payment processing, financial reporting. Prioritize by customer impact if they fail.`,`2. Define Recovery Objectives:RPO (recovery point objective) = how much data can we afford to lose? RTO (recovery time objective) = how long can we be down? Example: "We need to restore order processing within 4 hours. We can accept up to 1 hour of data loss."`,`3. Build Recovery Procedures:For each critical process, document alternate procedures. Can we process orders manually? Can we use subcontractors for delivery? Can we redirect calls to another location? Document step-by-step recovery procedures.`,`4. Test Annually:Don't assume your BCP will work. Test it. Simulate a scenario (major data center failure, key leader loss, natural disaster). Execute recovery procedures. Document lessons learned. Update BCP based on results.`]},{type:`heading`,level:3,text:`Business Continuity Checklist`},{type:`list`,ordered:!1,items:[`Backup & recovery:3-2-1 backup rule. Test restoration quarterly (see Technology section).`,`Alternate facilities:If primary office/warehouse damaged, where would we operate? Lease backup space (or develop relationship with vendor who can help). Ensure backup has necessary technology and connectivity.`,`Communication plan:How will we reach employees? Customers? Suppliers? Develop phone tree or SMS alert system. Test quarterly.`,`Vendor dependencies:Which vendors are mission-critical? (Fuel supplier, parts supplier, subcontractor). Develop relationships with backup vendors. Include business continuity requirements in vendor contracts.`,`Key person succession:For critical roles (CEO, CFO, key technical staff), develop succession plan. Cross-train backup person. Document critical decisions and procedures.`]}]},{id:`section-147`,title:`Crisis Management Protocol: When Things Go Wrong`,order:147,content:[{type:`paragraph`,text:`Despite best efforts, crises will happen. How you respond determines whether you survive and recover. This is the protocol:`},{type:`heading`,level:3,text:`Crisis Team Structure`},{type:`list`,ordered:!1,items:[`Core team:CEO (overall command), CFO (financial impact), General Counsel (legal exposure), VP Ops/affected functional leader (operational response), Chief Communications Officer (internal/external messaging).`,`Activation:CEO declares crisis (major customer loss, safety incident, breach, leadership scandal, natural disaster). Convenes crisis team within 30 minutes. Meets daily until crisis resolved.`,`Decision authority:CEO makes final decisions. Decisions documented. Legal counsel reviews all external communications for liability risk.`]},{type:`heading`,level:3,text:`Communication Cascade During Crisis`},{type:`list`,ordered:!1,items:[`Internal (within 1 hour):All-hands notification. CEO or communications lead. Factual information only. Explain what happened (briefly), what we're doing, what we're asking from employees (focus on customers, don't speculate).`,`Customers (within 4 hours if customer impact):Transparent communication. Explain impact on them. When will service resume. What we're doing. Contact number if they have questions.`,`Regulatory (within 24 hours if required):Consult legal. Report to relevant agencies (DOT for safety incident, EPA for environmental, FTC for consumer privacy, etc.). Meet regulatory timelines.`,`Media (within 24 hours if likely to go public):One spokesperson (CEO or PR lead). Simple, factual message. Acknowledge impact. Explain response. Don't speculate or over-promise. Brief company statement with no embellishment.`]},{type:`heading`,level:3,text:`Post-Crisis Assessment (AAR - After Action Review)`},{type:`list`,ordered:!1,items:[`Timing:Within 5 business days of crisis resolution, hold AAR. Crisis team + key people involved in response.`,`Questions:What happened? How did we respond? What did we do well? What could we have done better? What do we need to change to prevent this again?`,`Deliverables:Update risk register. Update BCP. Update crisis response procedures. Update insurance coverage if needed. Document learnings and share with team.`]}]},{id:`section-148`,title:`Key Person Risk: Succession Planning for Critical Roles`,order:148,content:[{type:`paragraph`,text:`Loss of a key leader (CEO, COO, CFO, VP Sales) can derail a company for months. Identify critical roles and build succession plans starting now.`},{type:`heading`,level:3,text:`Identifying Key Person Risk`},{type:`paragraph`,text:`Ask: "If this person left tomorrow, what would break?" If the answer is "critical business processes would fail," they are a key person. Typical key persons: CEO, COO, VP Sales (if handling major customer), technical expert (sole person who understands critical system), founder/owner with unique relationships.`},{type:`heading`,level:3,text:`Succession Plan Elements`},{type:`list`,ordered:!1,items:[`Identified successor:Who would step into this role? Is the successor ready now or do they need 6-12 months of development?`,`Skill gap analysis:What skills does the successor lack? Develop a learning plan. Training, mentoring, exposure to the role.`,`Cross-training:Ensure critical knowledge is shared. Backup person can cover at least 70% of the role.`,`Documentation:Document critical decisions, relationships, processes. Key person writes down the things they know. Share with successor.`,`Key person insurance:For critical leaders, consider key person life insurance (company owns policy, benefits company). Provides funds to hire replacement, retain team, manage transition.`]},{type:`heading`,level:3,text:`Top 10 Position Succession Planning`},{type:`list`,ordered:!1,items:[`Develop succession plans for: CEO, COO, CFO, VP Sales, VP Operations, VP HR, VP Finance, Chief Technology Officer, General Counsel, and one other critical role specific to your business.`,`Review annually. Update as team evolves. Assess readiness of successors. Accelerate development if needed.`]}]},{id:`section-149`,title:`The Compliance Program Framework`,order:149,content:[{type:`paragraph`,text:`We build compliance programs on the DOJ Compliance Program Evaluation CriteriaŌĆöthe same framework the Department of Justice uses to assess whether a company has a robust compliance culture. A strong program has seven components, and we deploy each one systematically.`}]},{id:`section-150`,title:`Contract Management Standards`,order:150,content:[{type:`paragraph`,text:`Contracts are where commercial promises become legal obligations. Poor contract management creates ambiguity, enables disputes, and erodes margins. We build systematic contract discipline.`},{type:`table`,caption:null,headers:[`Contract Type`,`Approval Authority`,`Legal Review Required`,`Board Approval`],rows:[[`Contract Type`,`Approval Authority`,`Legal Review Required`,`Board Approval`],[`Customer contract under $100K annual`,`Sales VP`,`No (uses template)`,`No`],[`Customer contract $100K - $500K`,`CEO or CFO`,`Yes (non-standard terms)`,`No`],[`Customer contract over $500K`,`CEO`,`Yes`,`Yes`],[`Vendor/supplier contract under $50K`,`Department head`,`No (uses template)`,`No`],[`Vendor/supplier contract $50K - $250K`,`CFO`,`Yes`,`No`],[`Vendor/supplier contract over $250K`,`CEO`,`Yes`,`Yes`],[`Employment agreement`,`HR + CEO`,`Yes`,`If C-suite`],[`NDA`,`Department head`,`No (uses template)`,`No`]]}]},{id:`section-151`,title:`Employment Law Fundamentals`,order:151,content:[{type:`paragraph`,text:`Employment law is complex and highly regulated. We ensure every portfolio company operates in compliance with federal and state employment law.`}]},{id:`section-152`,title:`Regulatory Landscape Monitoring`,order:152,content:[{type:`paragraph`,text:`Regulations change. We stay current so portfolio companies don't get caught flat-footed by new requirements.`}]},{id:`section-153`,title:`Litigation Management`,order:153,content:[{type:`paragraph`,text:`Despite best efforts, litigation happens. We manage it thoughtfully to minimize cost and business disruption.`}]},{id:`section-154`,title:`Intellectual Property Protection`,order:154,content:[{type:`paragraph`,text:`Intellectual property can be a significant source of value and competitive advantage. We protect it systematically.`}]},{id:`section-155`,title:`The Strategic Sourcing Framework`,order:155,content:[{type:`paragraph`,text:`We approach procurement with the same discipline we apply to operations. Strategic sourcing means understanding where the money goes, analyzing supplier markets, and making deliberate choices about how to buy.`}]},{id:`section-156`,title:`Vendor Evaluation & Management`,order:156,content:[{type:`paragraph`,text:`Vendors aren't interchangeable. We invest in partnerships with the right vendors and actively manage them.`}]},{id:`section-157`,title:`Procurement Standards & Controls`,order:157,content:[{type:`paragraph`,text:`We have discipline around the procurement process. Not every person can buy whatever they want at any price.`}]},{id:`section-158`,title:`Supply Chain Resilience`,order:158,content:[{type:`paragraph`,text:`COVID taught us that supply chain disruptions happen. We build resilience to minimize business impact.`}]},{id:`section-159`,title:`Equipment & Asset Procurement`,order:159,content:[{type:`paragraph`,text:`For operations-focused companies, equipment and asset procurement is a major decision with long-term implications.`}]},{id:`section-160`,title:`The ESG Business Case`,order:160,content:[{type:`paragraph`,text:`Before diving into ESG tactics, let's be clear about why we do this. ESG is financial value creation, not charity.`}]},{id:`section-161`,title:`ESG Assessment Framework`,order:161,content:[{type:`paragraph`,text:`We establish ESG baseline in first 90 days, then systematically improve across three pillars: Environmental, Social, Governance.`}]},{id:`section-162`,title:`Environmental: Carbon, Energy, Waste`,order:162,content:[{type:`paragraph`,text:`For many companies, especially those with significant operations, environmental impact is significant. We measure, target, and reduce.`}]},{id:`section-163`,title:`Social: DEI, Safety, Compensation, Community`,order:163,content:[{type:`paragraph`,text:`Social performance is about building an equitable, safe, high-performing organization.`}]},{id:`section-164`,title:`Governance: Ethics, Board, Data Privacy`,order:164,content:[{type:`paragraph`,text:`Governance is the foundation of trust. We build systems that ensure ethical conduct and protect shareholder interests.`}]},{id:`section-165`,title:`ESG Reporting for LP Communications`,order:165,content:[{type:`paragraph`,text:`We report on ESG progress to LPs and stakeholders. Strong reporting demonstrates commitment and tracks accountability.`}]},{id:`section-166`,title:`ESG Value Creation at Exit`,order:166,content:[{type:`paragraph`,text:`ESG performance drives financial value at exit. Companies with strong ESG track records command higher multiples and attract more buyers.`}]},{id:`section-167`,title:`Why Marketing Matters in Operational Companies`,order:167,content:[{type:`paragraph`,text:`Many operational companies underinvest in marketing. They assume sales will find customers. That's a strategic mistake. Strong marketing creates brand awareness, builds credibility, and makes sales more efficient.`}]},{id:`section-168`,title:`Brand Positioning Framework`,order:168,content:[{type:`paragraph`,text:`Every company needs a clear position in the market. We answer: Why should a customer choose US?`}]},{id:`section-169`,title:`Customer Journey Mapping`,order:169,content:[{type:`paragraph`,text:`We map the complete customer journey from awareness to advocacy. This informs content strategy and channel selection.`}]},{id:`section-170`,title:`Digital Marketing Playbook`,order:170,content:[{type:`paragraph`,text:`Digital is where customers research. We dominate digital channels.`}]},{id:`section-171`,title:`Marketing-to-Sales Handoff`,order:171,content:[{type:`paragraph`,text:`Marketing and sales are one system. We define exactly when marketing passes a lead to sales and how.`}]},{id:`section-172`,title:`Marketing ROI Measurement`,order:172,content:[{type:`paragraph`,text:`We measure marketing's financial contribution. Not just activity (impressions, clicks) but outcomes (revenue).`}]},{id:`section-173`,title:`Customer Segmentation & Personalization`,order:173,content:[{type:`paragraph`,text:`Different customers have different needs. We segment and tailor messaging accordingly.`}]},{id:`section-174`,title:`90-Day Implementation RoadmapŌłÆ`,order:174,content:[{type:`paragraph`,text:`This is a portfolio company's first 90 days after acquisition. Deploy this playbook in three phases: Foundation (Days 1-30), Build (Days 31-60), and Optimize (Days 61-90). Each phase has clear deliverables, owners, and success criteria. An operator should be able to take this roadmap and execute without outside guidance.`},{type:`heading`,level:3,text:`How to Use This Roadmap`},{type:`paragraph`,text:`This roadmap translates the entire operating playbook into a sequenced action plan. Start at Day 1, check off each milestone, and escalate blockers through the daily standup. Every item has a single owner and a measurable deliverable. At the end of 90 days, every section of this playbook should have an active owner, a scorecard, and a cadence meeting driving it forward.`},{type:`heading`,level:3,text:`How to Use This Roadmap ŌĆö Step by Step`},{type:`list`,ordered:!0,items:[`Step 1: Print the three phase tables below. Post them in the CEO's office and in the main conference room. This is the scoreboard for the first 90 days.`,`Step 2: Assign an owner for every line item on Day 1. The CEO owns this roadmap but does not execute every line. Each milestone has a functional owner. If you cannot name the owner, the milestone will not happen.`,`Step 3: Review progress in the daily standup. Every morning for the first 90 days, the CEO asks: 'What milestone are we working on today? What's blocking it?' This is not micromanagement ŌĆö it's launch discipline.`,`Step 4: Run phase checkpoints at Day 30, 60, and 90. Each checkpoint is a 2-hour session with the full leadership team. Score every milestone Green/Yellow/Red. Yellow items get an action plan. Red items get an A3.`]},{type:`heading`,level:3,text:`Phase 1: Foundation (Days 1-30)`},{type:`paragraph`,text:`Foundation phase focuses on establishing structure, assessing current state, and building alignment. The goal is to have the operating system installed and the leadership team speaking the same language by Day 30.`},{type:`table`,caption:`Foundation Phase Milestones`,headers:[`Milestone`,`Description`,`Owner`,`Deliverable`,`Success Criteria`],rows:[[`Operating System Kickoff`,`Introduce the Rayburn Capital operating playbook to the full leadership team`,`CEO + COO`,`Playbook training session (2 hours)`,`100% leadership attendance, Q&A log completed`],[`Organizational Assessment`,`Conduct current state assessment across all functions`,`COO + department heads`,`Written assessment (People, Ops, Sales, Finance)`,`Completed by Day 5`],[`90-Day Roadmap Alignment`,`Leadership team reviews and commits to 90-day roadmap`,`CEO`,`Signed roadmap with owner assignments`,`All 6 department heads sign off`],[`Daily Standup Launch`,`Establish CEO-led daily 15-minute standup`,`CEO`,`Standing calendar slot + standup log template`,`Running daily from Day 1`],[`Financial Baseline`,`Establish baseline P&L, forecast, and unit economics`,`CFO`,`Historical financials + 12-month forecast`,`CFO certified accuracy`],[`Sales Scorecard`,`Design first sales scorecard with pipeline, conversion rates`,`VP Sales`,`Scorecard template + initial data entry`,`Weekly sales reviews begin`],[`Operations Scorecard`,`Design first operations scorecard with quality and efficiency metrics`,`VP Operations`,`Scorecard template + initial data entry`,`Weekly operations reviews begin`],[`People Cadence Launch`,`Launch People Cadence meetings (weekly 1-on-1s, monthly team reviews)`,`Chief People Officer`,`Calendar invites + people scorecard v1`,`100% enrollment in 1-on-1s`],[`Customer List`,`Create comprehensive customer list with contact info, contract terms, NPS`,`VP Sales + VP Ops`,`Customer master list in CRM`,`100% customer record populated`]]},{type:`heading`,level:3,text:`Phase 2: Build (Days 31-60)`},{type:`paragraph`,text:`Build phase focuses on installing operating systems across all functions. By Day 60, every major functional area should have a scorecard, a cadence meeting, and an A3 plan for its top priority.`},{type:`table`,caption:`Build Phase Milestones`,headers:[`Milestone`,`Description`,`Owner`,`Deliverable`,`Success Criteria`],rows:[[`Sales Capacity Plan`,`Complete sales capacity plan (territories, quotas, coverage)`,`VP Sales`,`Territory map + quota methodology + hiring plan`,`Sales team trained on plan`],[`Top 10 Customers Review`,`Deep dive with top 10 customers (revenue, growth opportunity, risks)`,`CEO + VP Sales`,`Meeting notes + opportunity log per customer`,`All 10 customers met by CEO`],[`Operations Capability Map`,`Map current operations capabilities vs. best practice`,`VP Operations`,`Capability assessment document`,`Operations team validated`],[`Quality & Service Audit`,`Full quality and service audit across all fulfillment centers`,`VP Operations`,`Audit report with findings and recommendations`,`Delivered to leadership`],[`Financial Controls Assessment`,`Review of accounting, controls, compliance, audit-readiness`,`CFO + Controller`,`Internal controls checklist + remediation plan`,`Audit-ready assessment complete`],[`Pricing Review`,`Analysis of current pricing strategy and optimization opportunity`,`CFO + VP Sales`,`Pricing analysis + recommendation`,`Recommendation approved by CEO`],[`Organizational Design`,`Complete org chart with role descriptions and accountability`,`Chief People Officer`,`Org chart + role descriptions`,`CFO and CEO sign off`],[`Hiring Plan`,`Complete hiring plan for next 90 days (roles, timeline, budget)`,`Chief People Officer`,`Headcount plan + job descriptions`,`Board approval received`],[`Innovation Assessment`,`Assessment of product/service roadmap and innovation pipeline`,`Chief Product Officer`,`Product assessment + 18-month roadmap`,`Validated with top customers`]]},{type:`heading`,level:3,text:`Phase 3: Optimize (Days 61-90)`},{type:`paragraph`,text:`Optimize phase focuses on driving performance improvements and ensuring sustainability of the operating system. By Day 90, the company should be running with clear targets, active dashboards, and a culture of measurement and continuous improvement.`},{type:`table`,caption:`Optimize Phase Milestones`,headers:[`Milestone`,`Description`,`Owner`,`Deliverable`,`Success Criteria`],rows:[[`90-Day Checkpoint`,`Full leadership review of Days 1-90 (score each milestone Green/Yellow/Red)`,`CEO`,`Checkpoint presentation + action plan for Red items`,`Board presentation delivered`],[`2025 Operating Plan`,`Complete 2025 operating plan with targets, budgets, and initiatives`,`CEO + CFO`,`Detailed operating plan (P&L, headcount, capex, initiatives)`,`Board approved`],[`Quarterly Business Reviews`,`Establish quarterly business review cadence and meeting format`,`CEO`,`QBR calendar + template + scorecard`,`Q1 QBR scheduled`],[`Performance Bonuses`,`Design performance bonus structure aligned to playbook scorecards`,`CFO + Chief People Officer`,`Bonus plan + payout calculator + communication plan`,`Rolled out to all staff`],[`Leadership Development`,`Assessment of leader capability and development plan`,`Chief People Officer`,`Leadership assessment + individual development plans`,`Plans created for all 6 direct reports`],[`Customer NPS Program`,`Establish systematic NPS program and improvement roadmap`,`VP Sales + VP Operations`,`NPS baseline + top 20 driver analysis + action plan`,`NPS survey deployed`],[`Operational Excellence`,`Launch one high-impact Lean/A3 project in each function`,`VP Operations + functional leaders`,`6 A3 projects launched + initial results`,`Projects showing measurable impact`],[`Strategic Roadmap`,`Long-term (3-year) strategic roadmap and capital plan`,`CEO + CFO`,`3-year roadmap document + acquisition/capex plan`,`Board approved`],[`Culture Assessment`,`Employee engagement survey and culture assessment`,`Chief People Officer`,`Survey results + action plan + communication`,`Baseline established for next 90 days`]]},{type:`heading`,level:3,text:`What Success Looks Like at Day 90`},{type:`list`,ordered:!1,items:[`Every function has a scorecard with Red/Green status and tracked metrics`,`Weekly scorecard reviews are running across all departments`,`Sales team is organized with clear territories, quotas, and pipeline management`,`Operations team has quality and efficiency targets with tracking and accountability`,`Finance function has controls, forecast accuracy, and a 2025 operating plan`,`People function has 100% enrollment in 1-on-1s and a leadership development plan`,`CEO has full visibility into business performance through daily standups and weekly dashboards`,`Top 10 customers have been visited by CEO and have growth plans`,`Organization is aligned on values, priorities, and operating rhythm`,`Board visibility and communication cadence is established`,`Next 90-day plan is drafted and ready for execution on Day 91`]}]}],metadata:{title:`Rayburn Capital Operating Playbook V10`,version:`10.0`,totalSections:174,totalTables:58,totalParagraphs:523}};function Hr(){let[e,t]=(0,_.useState)(!1),[n,r]=(0,_.useState)(``),[i,a]=(0,_.useState)([]),o=(0,_.useRef)(null),s=dt();(0,_.useEffect)(()=>{if(n.trim().length===0){a([]);return}let e=n.toLowerCase(),t=[];(Array.isArray(Vr)?Vr:Vr.sections||[]).forEach(n=>{let r=[];n.title&&n.title.toLowerCase().includes(e)&&r.push({type:`title`,text:n.title,position:n.title.toLowerCase().indexOf(e)}),n.content&&Array.isArray(n.content)&&n.content.forEach((t,n)=>{if(t.type===`paragraph`&&t.text&&t.text.toLowerCase().includes(e)){let i=t.text.substring(0,100)+`...`;r.push({type:`content`,text:i,itemIndex:n,position:t.text.toLowerCase().indexOf(e)})}}),r.length>0&&t.push({...n,matches:r.slice(0,2)})}),a(
